<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MOUV-MENT SASU - Formation, Coaching et Solutions Numériques pour Entrepreneurs">
    <meta name="robots" content="noindex, nofollow">
    <title>MOUV-MENT | Site en construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #ffffff;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(180,140,80,0.04) 0%, transparent 60%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            width: 100%;
            /* ✅ Remonté vers le haut */
            margin-top: -60px;
        }

        /* ✅ Logo centré et remonté */
        .logo-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 260px;
            max-width: 75%;
            mix-blend-mode: screen;
            display: block;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(180,140,80,0.12);
            border: 1px solid rgba(180,140,80,0.3);
            color: #c9a84c;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 7px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 6px; height: 6px;
            background: #c9a84c;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.3;
            margin-bottom: 14px;
        }

        h1 span { color: #c9a84c; font-weight: 500; }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.45);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .divider {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
            margin: 0 auto 28px;
        }

        .activities-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 14px;
        }

        .activities-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .activity-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .activity-link:hover {
            background: rgba(180,140,80,0.15);
            border-color: rgba(180,140,80,0.4);
            color: #c9a84c;
            transform: translateY(-2px);
        }

        .activity-link svg { width: 16px; height: 16px; }

        .contact {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
        }

        .contact a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact a:hover { color: #c9a84c; }

        footer {
            position: absolute;
            bottom: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
